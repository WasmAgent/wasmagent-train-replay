# Mirrors .github/workflows/ci.yml
# NOTE: this runner uses an externally-managed (PEP 668) Python, so a bare
# `pip install --user` fails with "externally-managed-environment". We use a
# gitignored .venv instead. Each verify command runs in its own shell, so the
# venv is referenced by path (.venv/bin/...) rather than activated.
#
# The venv is placed on a large shared disk when available (mounted at
# /mnt/bigdisk) and falls back to a local .venv-local otherwise, so a mount
# outage degrades gracefully instead of hanging the install gate.
commands:
  - name: install
    cmd: >-
      SLUG=$(basename "$PWD");
      if timeout 8 bash -c "test -d /mnt/bigdisk/venv && touch /mnt/bigdisk/venv/.probe-$SLUG 2>/dev/null && rm -f /mnt/bigdisk/venv/.probe-$SLUG" 2>/dev/null;
      then VENV=/mnt/bigdisk/venv/$SLUG; echo "[venv] bigdisk: $VENV";
      else VENV="$PWD/.venv-local"; echo "[venv] local fallback: $VENV"; fi;
      { [ -x "$VENV/bin/python" ] || python3 -m venv "$VENV"; }
      && rm -rf .venv && ln -sfn "$VENV" .venv
      && .venv/bin/pip install -e ".[dev]" -q --no-cache-dir --extra-index-url https://download.pytorch.org/whl/cpu
    timeout: 5m
    level: 1
  - name: python-import
    cmd: >-
      .venv/bin/python -c
      "import train_replay; import train_replay.agent; import train_replay.replay; import train_replay.recording"
    timeout: 30s
    level: 1
  - name: lint
    cmd: .venv/bin/python -m ruff check train_replay tests
    timeout: 2m
    level: 2
  - name: typecheck
    cmd: .venv/bin/python -m mypy train_replay
    timeout: 3m
    level: 2
  - name: test
    cmd: .venv/bin/python -m pytest tests/ -x
    timeout: 8m
    level: 3
  - name: mypy-strict
    cmd: .venv/bin/python -m mypy train_replay --strict --ignore-missing-imports 2>&1 | tail -20
    timeout: 3m
    level: 4
